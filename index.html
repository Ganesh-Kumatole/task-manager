<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- favicon -->
    <link rel="shortcut icon" href="./favicon.ico" type="image/x-icon" />
    <!-- font awesome (served from node_modules via /vendor) -->
    <link rel="stylesheet" href="/vendor/fontawesome/css/all.min.css" />
    <!-- normalize css -->
    <link rel="stylesheet" href="./normalize.css" />
    <!-- main css -->
    <link rel="stylesheet" href="./main.css" />
    <title>Task Manager</title>
  </head>
  <body>
    <!-- Header Section -->
    <header class="app-header">
      <h1><i class="fas fa-task"></i> Task Manager</h1>
      <p>Organize your life, one task at a time</p>
    </header>

    <!-- Task Form -->
    <form class="task-form">
      <h4>Add New Task</h4>
      <div class="form-control">
        <input
          type="text"
          name="name"
          class="task-input"
          placeholder="e.g., Wash dishes"
          required
        />
        <button type="submit" class="btn submit-btn">
          <i class="fas fa-plus"></i> Add
        </button>
      </div>

      <!-- Additional Task Fields -->
      <div class="form-row-grid">
        <div class="form-field">
          <label for="task-category">Category</label>
          <select name="category" id="task-category" class="task-select">
            <option value="" selected disabled hidden>Select category</option>
            <option value="work">Work</option>
            <option value="study">Study</option>
            <option value="health">Health</option>
            <option value="sports">Sports</option>
            <option value="finance">Finance</option>
            <option value="chore">Chore</option>
            <option value="family">Family</option>
            <option value="personal">Personal</option>
            <option value="others">Others</option>
          </select>
        </div>

        <div class="form-field">
          <label for="task-priority">Priority</label>
          <select name="priority" id="task-priority" class="task-select">
            <option value="" disabled selected hidden>Select Priority</option>
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
          </select>
        </div>
      </div>

      <div class="form-alert"></div>
    </form>

    <!-- Filter & Sort Controls -->
    <section class="filters-container">
      <div class="filters-panel">
        <!-- Search -->
        <div class="filter-group search-group">
          <div class="search-input-wrapper">
            <input
              type="text"
              id="search-input"
              class="filter-search"
              placeholder="Search tasks..."
            />
            <i class="fas fa-search"></i>
          </div>
        </div>

        <!-- Filter Dropdowns -->
        <div class="filter-row">
          <!-- Status Filter -->
          <div class="filter-group">
            <label for="status-filter">
              <i class="fas fa-filter"></i> Status
            </label>
            <select id="status-filter" class="filter-select">
              <option value="all">All</option>
              <option value="pending">Pending</option>
              <option value="doing">Doing</option>
              <option value="completed">Completed</option>
            </select>
          </div>

          <!-- Category Filter -->
          <div class="filter-group">
            <label for="category-filter">
              <i class="fas fa-tags"></i> Category
            </label>
            <select id="category-filter" class="filter-select">
              <option value="all">All</option>
              <option value="work">Work</option>
              <option value="study">Study</option>
              <option value="health">Health</option>
              <option value="sports">Sports</option>
              <option value="finance">Finance</option>
              <option value="chore">Chore</option>
              <option value="family">Family</option>
              <option value="personal">Personal</option>
              <option value="others">Others</option>
            </select>
          </div>

          <!-- Priority Filter -->
          <div class="filter-group">
            <label for="priority-filter">
              <i class="fas fa-exclamation-circle"></i> Priority
            </label>
            <select id="priority-filter" class="filter-select">
              <option value="all">All</option>
              <option value="low">Low</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
            </select>
          </div>

          <!-- Sort Field -->
          <div class="filter-group">
            <label for="sort-field">
              <i class="fas fa-sort"></i> Sort By
            </label>
            <select id="sort-field" class="filter-select">
              <option value="createdAt">Created Time</option>
              <option value="updatedAt">Updated TIme</option>
              <option value="name">Task Name</option>
              <option value="status">Status</option>
              <option value="category">Category</option>
              <option value="priority">Priority</option>
            </select>
          </div>

          <!-- Sort Order -->
          <div class="filter-group">
            <label for="sort-order">
              <i class="fas fa-sort-amount-up"></i> Order
            </label>
            <select id="sort-order" class="filter-select">
              <option value="desc">Descending</option>
              <option value="asc">Ascending</option>
            </select>
          </div>
        </div>
      </div>
    </section>

    <!-- Tasks Container -->
    <section class="tasks-container">
      <p class="loading-text">Loading...</p>
      <div class="tasks"></div>
    </section>

    <!-- Pagination Controls -->
    <section class="pagination-container">
      <div class="pagination-info">
        <span id="pagination-text">Showing 0-0 of 0 tasks</span>
      </div>
      <div class="pagination-controls">
        <!-- Items per page -->
        <div class="items-per-page">
          <label for="items-per-page">Show:</label>
          <select id="items-per-page" class="filter-select small">
            <option value="5">5</option>
            <option value="10" selected>10</option>
            <option value="20">20</option>
            <option value="50">50</option>
          </select>
        </div>

        <!-- Page Buttons -->
        <div class="pagination-buttons">
          <button
            id="first-page"
            class="btn btn-small btn-outline"
            title="First Page"
          >
            <i class="fas fa-angle-double-left"></i>
          </button>
          <button
            id="prev-page"
            class="btn btn-small btn-outline"
            title="Previous Page"
          >
            <i class="fas fa-angle-left"></i>
          </button>

          <div id="page-numbers" class="page-numbers">
            <!-- Page numbers will be rendered here -->
          </div>

          <button
            id="next-page"
            class="btn btn-small btn-outline"
            title="Next Page"
          >
            <i class="fas fa-angle-right"></i>
          </button>
          <button
            id="last-page"
            class="btn btn-small btn-outline"
            title="Last Page"
          >
            <i class="fas fa-angle-double-right"></i>
          </button>
        </div>
      </div>
    </section>

    <script src="./browser-app.js" type="module"></script>
  </body>
</html>
